name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: stable
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    needs: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: stable
      - run: cargo test -p minkowski

  miri:
    name: Miri
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri, rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly
      - name: Miri tests (skip par_for_each)
        run: cargo +nightly miri test -p minkowski --lib -- --skip par_for_each
        env:
          MIRIFLAGS: "-Zmiri-tree-borrows"
      - name: Miri par_for_each (ignore leaks)
        run: cargo +nightly miri test -p minkowski --lib par_for_each
        env:
          MIRIFLAGS: "-Zmiri-tree-borrows -Zmiri-ignore-leaks"
